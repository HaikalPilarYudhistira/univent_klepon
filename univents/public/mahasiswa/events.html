<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acara — UNIVENTS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="brand">UNI<span>VENTS</span></div>
  <div class="navbar-links">
    <a href="/mahasiswa/events.html" class="active">Acara</a>
    <a href="/mahasiswa/notifikasi.html" id="notifLink">Notifikasi</a>
    <a href="#" id="logoutLink">Keluar</a>
  </div>
</nav>

<div class="main" style="max-width:1000px; margin:0 auto;">
  <div class="page-header">
    <div>
      <span class="eyebrow">Jelajahi</span>
      <h1>Acara kampus untukmu</h1>
    </div>
    <select id="filterKategori" style="background:var(--bg-card); border:1px solid var(--border); color:var(--fg); padding:10px 14px; border-radius:8px;">
      <option value="">Semua kategori</option>
      <option value="akademik">Akademik</option>
      <option value="seni">Seni</option>
      <option value="olahraga">Olahraga</option>
      <option value="organisasi">Organisasi</option>
      <option value="lainnya">Lainnya</option>
    </select>
  </div>

  <div id="eventList" class="event-grid">
    <div class="loading-state">Memuat acara...</div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  UNIVENTS.guard('mahasiswa');

  document.getElementById('logoutLink').addEventListener('click', (e) => {
    e.preventDefault();
    UNIVENTS.logout();
  });

  const listEl = document.getElementById('eventList');
  const filterEl = document.getElementById('filterKategori');
  let myRegisteredIds = new Set();

  function kategoriLabel(k) {
    const map = { akademik: 'Akademik', seni: 'Seni', olahraga: 'Olahraga', organisasi: 'Organisasi', lainnya: 'Lainnya' };
    return map[k] || k;
  }

  function renderEvents(events) {
    if (events.length === 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="icon">🎫</div><p>Belum ada acara untuk kategori ini. Coba pilih kategori lain.</p></div>`;
      return;
    }

    listEl.innerHTML = events.map((ev) => {
      const d = new Date(ev.tanggal_mulai);
      const day = d.getDate();
      const month = d.toLocaleDateString('id-ID', { month: 'short' }).toUpperCase();
      const sudahDaftar = myRegisteredIds.has(ev.id);
      const penuh = ev.kuota > 0 && ev.jumlah_peserta >= ev.kuota;

      return `
        <div class="ticket-card">
          <div class="ticket-main">
            <span class="badge badge-${ev.kategori}">${kategoriLabel(ev.kategori)}</span>
            <h3 class="ticket-title" style="margin-top:10px;">${ev.judul}</h3>
            <p class="ticket-desc">${(ev.deskripsi || '').slice(0, 140)}${ev.deskripsi && ev.deskripsi.length > 140 ? '…' : ''}</p>
            <div class="ticket-meta">
              <span>📍 ${ev.lokasi || 'Lokasi belum ditentukan'}</span>
              <span>🕒 ${UNIVENTS.formatJam(ev.tanggal_mulai)}</span>
              <span>👥 ${ev.jumlah_peserta}${ev.kuota > 0 ? ' / ' + ev.kuota : ''} peserta</span>
            </div>
            <div class="ticket-footer">
              <a href="/mahasiswa/detail.html?id=${ev.id}" class="btn btn-ghost btn-sm">Lihat detail</a>
              ${sudahDaftar
                ? `<span class="badge" style="background:#2CB67D1A; color:var(--success);">✓ Terdaftar</span>`
                : penuh
                  ? `<span class="badge" style="background:#2A2839; color:var(--fg-muted);">Kuota penuh</span>`
                  : `<button class="btn btn-primary btn-sm" onclick="daftarEvent(${ev.id})">Daftar</button>`
              }
            </div>
          </div>
          <div class="ticket-stub">
            <span class="date-day">${day}</span>
            <span class="date-month">${month}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  async function loadMyRegistrations() {
    try {
      const data = await UNIVENTS.api('/peserta');
      myRegisteredIds = new Set(data.peserta.map((p) => p.event_id));
    } catch (err) {
      // kalau gagal, lanjutkan tanpa status pendaftaran
      myRegisteredIds = new Set();
    }
  }

  async function loadEvents() {
    listEl.innerHTML = '<div class="loading-state">Memuat acara...</div>';
    try {
      const kategori = filterEl.value;
      const query = kategori ? `?status=published&kategori=${kategori}` : '?status=published';
      const data = await UNIVENTS.api(`/events${query}`);
      renderEvents(data.events);
    } catch (err) {
      listEl.innerHTML = `<div class="empty-state"><p>Gagal memuat acara: ${err.message}</p></div>`;
    }
  }

  async function daftarEvent(eventId) {
    try {
      await UNIVENTS.api('/peserta', { method: 'POST', body: { event_id: eventId } });
      myRegisteredIds.add(eventId);
      loadEvents();
    } catch (err) {
      alert(err.message);
    }
  }

  filterEl.addEventListener('change', loadEvents);

  (async () => {
    await loadMyRegistrations();
    await loadEvents();
  })();
</script>

</body>
</html>
